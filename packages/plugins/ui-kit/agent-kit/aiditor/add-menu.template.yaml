items:
  - id: ui-kit:popover-menu
    title: Popover menu
    category: UI Kit
    subCategory: Components
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract popover-menu.
      Read agent-kit/designer/popover-menu.md for import, refs (trigger, popover), and CSS.
      Hover-triggered dropdown; for click-triggered popups use click-popover.md (pure HTML).

