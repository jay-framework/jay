<div jay-coordinate="S0/0">
  <h1>Phase ForEach Test</h1>
  <section class="slow">
    <h2>Slow List</h2>
    <ul jay-coordinate="S1/0">
      <li>Slow A</li>
    </ul>
    <ul jay-coordinate="S2/0">
      <li>Slow B</li>
    </ul>
  </section>
  <section class="fast" jay-coordinate="S0/0/2">
    <h2>Fast List</h2>
    <ul jay-coordinate="S0/0/2/1">
      <li jay-coordinate="S3/0">Fast A</li>
    </ul>
    <ul jay-coordinate="S0/0/2/1">
      <li jay-coordinate="S3/0">Fast B</li>
    </ul>
  </section>
  <section class="fast-mixed" jay-coordinate="S0/0/3">
    <h2>Fast Mixed List</h2>
    <div class="item" jay-coordinate="S0/0/3/1">
      <span class="label" jay-coordinate="S4/0">Mixed A</span>
      <span class="count" jay-coordinate="S4/1">10</span>
      <button jay-coordinate="S4/2">+1</button>
    </div>
    <div class="item" jay-coordinate="S0/0/3/1">
      <span class="label" jay-coordinate="S4/0">Mixed B</span>
      <span class="count" jay-coordinate="S4/1">20</span>
      <button jay-coordinate="S4/2">+1</button>
    </div>
  </section>
  <section class="interactive" jay-coordinate="S0/0/4">
    <h2>Interactive List</h2>
    <div class="item" jay-coordinate="S0/0/4/1">
      <span class="label" jay-coordinate="S5/0">Interactive A</span>
      <span class="count" jay-coordinate="S5/1">100</span>
      <button jay-coordinate="S5/2">+1</button>
    </div>
    <div class="item" jay-coordinate="S0/0/4/1">
      <span class="label" jay-coordinate="S5/0">Interactive B</span>
      <span class="count" jay-coordinate="S5/1">200</span>
      <button jay-coordinate="S5/2">+1</button>
    </div>
    <button jay-coordinate="S0/0/4/2">Add</button>
    <button jay-coordinate="S0/0/4/3">Remove</button>
  </section>
</div>
