<div jay-coordinate="0">
  <h1>Phase ForEach Test</h1>
  <section class="slow">
    <h2>Slow List</h2>
    <ul>
      <li>Slow A</li>
    </ul>
    <ul>
      <li>Slow B</li>
    </ul>
  </section>
  <section class="fast" jay-coordinate="0/2">
    <h2>Fast List</h2>
    <ul jay-coordinate="f1">
      <li jay-coordinate="f1/0">Fast A</li>
    </ul>
    <ul jay-coordinate="f2">
      <li jay-coordinate="f2/0">Fast B</li>
    </ul>
  </section>
  <section class="fast-mixed" jay-coordinate="0/3">
    <h2>Fast Mixed List</h2>
    <div class="item" jay-coordinate="m1">
      <span class="label" jay-coordinate="m1/0">Mixed A</span>
      <span class="count" jay-coordinate="m1/1">10</span>
      <button jay-coordinate="m1/2">+1</button>
    </div>
    <div class="item" jay-coordinate="m2">
      <span class="label" jay-coordinate="m2/0">Mixed B</span>
      <span class="count" jay-coordinate="m2/1">20</span>
      <button jay-coordinate="m2/2">+1</button>
    </div>
  </section>
  <section class="interactive" jay-coordinate="0/4">
    <h2>Interactive List</h2>
    <div class="item" jay-coordinate="i1">
      <span class="label" jay-coordinate="i1/0">Interactive A</span>
      <span class="count" jay-coordinate="i1/1">100</span>
      <button jay-coordinate="i1/2">+1</button>
    </div>
    <div class="item" jay-coordinate="i2">
      <span class="label" jay-coordinate="i2/0">Interactive B</span>
      <span class="count" jay-coordinate="i2/1">200</span>
      <button jay-coordinate="i2/2">+1</button>
    </div>
    <button jay-coordinate="0/4/2">Add</button>
    <button jay-coordinate="0/4/3">Remove</button>
  </section>
</div>
