plugins:
  - name: test-plugin
    path: ./src/plugins/test-plugin
    contracts:
      - name: test-widget
        type: static
        path: ./src/plugins/test-plugin/test-widget.jay-contract
  - name: markdown
    path: ./../../../packages/plugins/markdown
    contracts:
      - name: markdown-pages
        description: Renders a directory of markdown files as routable pages
        type: static
        path: ./../../../packages/plugins/markdown/dist/markdown-pages.jay-contract
      - name: markdown-content
        description: Renders a markdown string to HTML at build time (slow phase)
        type: static
        path: ./../../../packages/plugins/markdown/dist/markdown-content.jay-contract
      - name: markdown-live
        description: Renders markdown with fast+interactive updates
        type: static
        path: ./../../../packages/plugins/markdown/dist/markdown-live.jay-contract
