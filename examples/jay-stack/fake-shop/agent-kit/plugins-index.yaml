jay_stack_version: 0.0.0
plugins:
  - name: product-rating
    path: ./src/plugins/product-rating
    contracts:
      - name: product-rating
        type: static
        path: ./src/plugins/product-rating/product-rating.jay-contract
  - name: product-widget
    path: ./src/plugins/product-widget
    contracts:
      - name: product-widget
        type: static
        path: ./src/plugins/product-widget/product-widget.jay-contract
  - name: stock-status
    path: ./src/plugins/stock-status
    contracts:
      - name: stock-status
        type: static
        path: ./src/plugins/stock-status/stock-status.jay-contract
  - name: webmcp
    path: ./../../../packages/jay-stack-plugins/webmcp
    contracts: []
  - name: mood-tracker-plugin
    path: ./../mood-tracker-plugin
    contracts:
      - name: mood-tracker
        type: static
        path: ./../mood-tracker-plugin/dist/mood-tracker.jay-contract
