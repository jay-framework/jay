plugins:
  - name: product-rating
    path: ./src/plugins/product-rating
    contracts:
      - name: product-rating
        description: Product rating widget with stars and review count
        type: static
        path: ./src/plugins/product-rating/product-rating.jay-contract
  - name: product-widget
    path: ./src/plugins/product-widget
    contracts:
      - name: product-widget
        description: Product widget card showing name, price, and stock status
        type: static
        path: ./src/plugins/product-widget/product-widget.jay-contract
    routes:
      - path: /admin/products
        description: Product admin dashboard — list all products with stats
  - name: stock-status
    path: ./src/plugins/stock-status
    contracts:
      - name: stock-status
        description: Stock status badge showing availability (fast-only, no slow phase)
        type: static
        path: ./src/plugins/stock-status/stock-status.jay-contract
  - name: ui-kit
    path: ./../../../packages/plugins/ui-kit
    contracts:
      - name: popover-menu
        description: Hover-triggered popover using the Popover API — adds showPopover()
          on mouseenter
        type: static
        path: ./../../../packages/plugins/ui-kit/dist/popover-menu.jay-contract
      - name: scroll-carousel
        description: Prev/next scroll buttons for CSS scroll-snap containers — tracks
          atStart/atEnd
        type: static
        path: ./../../../packages/plugins/ui-kit/dist/scroll-carousel.jay-contract
      - name: clipboard-copy
        description: Copy text to clipboard with visual feedback — toggles copied state
          for 2 seconds
        type: static
        path: ./../../../packages/plugins/ui-kit/dist/clipboard-copy.jay-contract
  - name: webmcp
    path: ./../../../packages/plugins/webmcp
    contracts: []
  - name: mood-tracker-plugin
    path: ./../mood-tracker-plugin
    contracts:
      - name: mood-tracker
        description: A mood tracker component with happy, neutral, and sad states
        type: static
        path: ./../mood-tracker-plugin/dist/mood-tracker.jay-contract
    routes:
      - path: /mood-stats
        description: Mood statistics dashboard — view mood history and trends
